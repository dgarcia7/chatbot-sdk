<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chatbot SDK - Demo Interactiva</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Ubuntu', 'Arial', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 8px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .header p {
      font-size: 1rem;
      opacity: 0.9;
    }

    .demo-container {
      max-width: 900px;
      margin: 0 auto 20px;
    }

    .panel {
      background: white;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .panel h2 {
      font-size: 1.3rem;
      margin-bottom: 15px;
      color: #333;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel h2::before {
      content: '⚙️';
      font-size: 1.5rem;
    }

    .code-editor {
      width: 100%;
      min-height: 380px;
      padding: 16px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
      background: #f9fafb;
      resize: vertical;
      line-height: 1.5;
      color: #1f2937;
    }

    .code-editor:focus {
      outline: none;
      border-color: #667eea;
      background: white;
    }

    .controls {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-top: 15px;
    }

    .button-group {
      display: flex;
      gap: 10px;
      flex: 1;
    }

    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .btn-primary {
      background: #667eea;
      color: white;
      flex: 1;
    }

    .btn-primary:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .toggle-container {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: #f3f4f6;
      border-radius: 8px;
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-container:hover {
      background: #e5e7eb;
    }

    .toggle-container input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    .toggle-container label {
      font-size: 13px;
      color: #374151;
      font-weight: 500;
      cursor: pointer;
      margin: 0;
    }

    .error-message {
      background: #fee;
      color: #c33;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 14px;
      border-left: 4px solid #c33;
      display: none;
    }

    .success-message {
      background: #efe;
      color: #3c3;
      padding: 15px;
      border-radius: 8px;
      margin-top: 15px;
      font-size: 14px;
      border-left: 4px solid #3c3;
      display: none;
    }

    .info-box {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      border-radius: 8px;
      padding: 12px;
      margin-top: 15px;
      font-size: 12px;
      color: #1e40af;
      line-height: 1.6;
    }

    .info-box strong {
      display: block;
      margin-bottom: 4px;
    }

    .footer {
      text-align: center;
      color: white;
      padding: 15px;
      font-size: 13px;
      opacity: 0.8;
    }

    .footer a {
      color: white;
      text-decoration: underline;
    }

    code {
      background: rgba(0,0,0,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1Configura y prueba tu chatbot en tiempo real</p>
  </div>

  <div class="demo-container">
    <div class="panel">
      <h2>Configuración del Chatbot</h2>
      <textarea class="code-editor" id="configEditor">ChatBot.init({
  title: "Asistente Virtual Nova",
  subtitle: "En línea • Responde en segundos",
  botName: "Nova AI",
  botAvatar: "https://i.pinimg.com/474x/be/f2/aa/bef2aad7a1e299b87eefea11756b16df.jpg",
  placeholder: "Pregúntame lo que necesites...",
  welcomeMessage: "👋 ¡Hola! Soy Nova, tu asistente virtual.\n\n¿En qué puedo ayudarte hoy?",
  color: "#8b5cf6",
  apiUrl: "https://api.miempresa.com/chatbot/v1",
  apiKey: "sk_live_abc123xyz789",
  userName: "María González"
});</textarea>

      <div class="controls">
        <div class="button-group">
          <button class="btn btn-primary" id="applyBtn">🚀 Aplicar</button>
          <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
        </div>
        <div class="toggle-container" onclick="document.getElementById('keepOpenCheck').click()">
          <input type="checkbox" id="keepOpenCheck" onclick="event.stopPropagation()">
          <label for="keepOpenCheck">Mantener chat abierto</label>
        </div>
      </div>

      <div class="error-message" id="errorMsg"></div>
      <div class="success-message" id="successMsg">✓ Configuración aplicada</div>

      <div class="info-box">
        <strong>💡 Atajos:</strong> <code>Ctrl/Cmd + Enter</code> para aplicar • Haz clic en el botón flotante 💬 (esquina inferior derecha) para ver el chat
      </div>
    </div>
  </div>
</div>

<div class="footer">
  <p>
    Chatbot SDK v1.0.0 | 
    <a href="https://github.com/dgarcia7/chatbot-sdk" target="_blank">GitHub</a> |
    <a href="README.md" target="_blank">Documentación</a>
  </p>
</div>

<script src="./sdk/chatbot.js"></script>
<script>
  let currentChatBot = null;
  
  // Configuración por defecto como objeto
  const defaultConfigObj = {
    title: "Asistente Virtual Nova",
    subtitle: "En línea • Responde en segundos",
    botName: "Nova AI",
    botAvatar: "https://i.pinimg.com/474x/be/f2/aa/bef2aad7a1e299b87eefea11756b16df.jpg",
    placeholder: "Pregúntame lo que necesites...",
    welcomeMessage: "👋 ¡Hola! Soy Nova, tu asistente virtual.\n\n¿En qué puedo ayudarte hoy?",
    color: "#8b5cf6",
    apiUrl: "https://api.miempresa.com/chatbot/v1",
    apiKey: "sk_live_abc123xyz789",
    userName: "María González"
  };

  const configEditor = document.getElementById('configEditor');
  const applyBtn = document.getElementById('applyBtn');
  const resetBtn = document.getElementById('resetBtn');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const keepOpenCheck = document.getElementById('keepOpenCheck');

  // Inicializar con configuración por defecto automáticamente
  currentChatBot = ChatBot.init(defaultConfigObj);

  applyBtn.addEventListener('click', () => {
    const code = configEditor.value;
    applyConfiguration(code);
  });

  resetBtn.addEventListener('click', () => {
    // Resetear a configuración por defecto
    if (currentChatBot) {
      const oldButton = document.querySelector('.cb-button');
      const oldChat = document.querySelector('.cb-chat');
      if (oldButton) oldButton.remove();
      if (oldChat) oldChat.remove();
    }
    currentChatBot = ChatBot.init(defaultConfigObj);
    successMsg.textContent = '✓ Configuración reseteada';
    successMsg.style.display = 'block';
    setTimeout(() => {
      successMsg.style.display = 'none';
    }, 2000);
  });

  // Permitir aplicar con Ctrl+Enter o Cmd+Enter
  configEditor.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      const code = configEditor.value;
      applyConfiguration(code);
    }
  });

  function applyConfiguration(code) {
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';

    try {
      // Remover el chatbot anterior si existe
      if (currentChatBot) {
        const oldButton = document.querySelector('.cb-button');
        const oldChat = document.querySelector('.cb-chat');
        if (oldButton) oldButton.remove();
        if (oldChat) oldChat.remove();
      }

      // Validar que el código contenga ChatBot.init
      if (!code.includes('ChatBot.init')) {
        throw new Error('El código debe contener ChatBot.init({ ... })');
      }

      // Ejecutar el código directamente
      currentChatBot = eval(code);

      // Abrir el chat automáticamente si está activada la opción
      if (keepOpenCheck.checked) {
        setTimeout(() => {
          const chatButton = document.querySelector('.cb-button');
          if (chatButton) {
            chatButton.click();
          }
        }, 100);
      }

      // Mostrar mensaje de éxito
      successMsg.textContent = '✓ Configuración aplicada';
      successMsg.style.display = 'block';
      setTimeout(() => {
        successMsg.style.display = 'none';
      }, 2000);

    } catch (error) {
      errorMsg.textContent = `❌ Error: ${error.message}`;
      errorMsg.style.display = 'block';
      console.error('Error al inicializar el chatbot:', error);
    }
  }
</script>

</body>
</html>
